<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nick 💘 Chicca</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <script src="js/jquery.js"></script>
    <script src="js/garden.js"></script>
    <script src="js/functions.js"></script>
</head>
<body>

<div id="lockScreen">
    <img class="bg" src="https://i.imgur.com/1cqpDVr.jpeg" alt="Lucky">
    <div class="overlay"></div>
    <div class="lock-content">
        <h1>Nick & Chicca</h1>
        <div class="card">
            <p>Come si chiama la nostra mascotte?</p>
            <input id="lockInput" type="password" placeholder="scrivi qui..." maxlength="20" onkeydown="if(event.key==='Enter')checkLock()">
            <p id="lockError" style="display:none; color:#c4687a; font-size:0.9rem; margin-top:5px;">Risposta non corretta, riprova 🌸</p>
            <button onclick="checkLock()">Entra ✨</button>
        </div>
        <p class="lock-credit">fatto con amore da Nick 💘</p>
    </div>
</div>

<div class="petal-container" id="petalContainer"></div>
<div class="heart-container" id="heartContainer"></div>

<div id="spotifyBox" class="spotify-card">
    <div class="spotify-header">
        <div class="spotify-title">
            <img src="https://em-content.zobj.net/source/apple/453/sparkling-heart_1f496.png" style="width:1.2em;">
            <span>La nostra musica</span>
        </div>
        <button onclick="toggleSpotify()" class="spotify-close">✕</button>
    </div>
    <div class="spotify-content">
        <iframe 
            style="border-radius:12px" 
            src="https://open.spotify.com/playlist/20byPNLhw6tDqCbcDBNYYQ?si=5b4a20b1bfcb4fb0" 
            width="100%" 
            height="152" 
            frameBorder="0" 
            allowfullscreen="" 
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
            loading="lazy">
        </iframe>
    </div>
</div>

<button class="music-btn" id="musicBtn" onclick="toggleSpotify()">
    <img src="https://em-content.zobj.net/source/apple/453/musical-note_1f3b5.png" style="width:1.2em;height:1.2em;" id="musicIcon">
</button>

<section id="heroSection">
    <div id="loveHeart">
        <canvas id="garden"></canvas>
        <div id="words">
            <div id="messages">Nick & Chicca</div>
            <div id="loveu">
                più tempo passa, più mi innamoro
                <div class="signature">— Nick 💘</div>
            </div>
        </div>
    </div>
</section>

<section class="timer-section">
    <p class="timer-label">🌸 Insieme da 🌸</p>
    <div class="timer-grid">
        <div class="timer-block"><span class="timer-num" id="t-giorni">0</span><span class="timer-unit">giorni</span></div>
        <div class="timer-block"><span class="timer-num" id="t-ore">00</span><span class="timer-unit">ore</span></div>
        <div class="timer-block"><span class="timer-num" id="t-min">00</span><span class="timer-unit">minuti</span></div>
        <div class="timer-block"><span class="timer-num" id="t-sec">00</span><span class="timer-unit">secondi</span></div>
    </div>
</section>

<script>
// LOGICA LOCK
function checkLock(){
    var val = document.getElementById('lockInput').value.trim().toLowerCase();
    if(val === 'lucky'){
        sessionStorage.setItem('unlocked','1');
        unlockWithTransition();
    } else {
        document.getElementById('lockError').style.display = 'block';
    }
}
function unlockWithTransition(){
    var ls = document.getElementById('lockScreen');
    ls.style.transition = 'opacity 1s ease';
    ls.style.opacity = '0';
    setTimeout(function(){ ls.style.display = 'none'; }, 1000);
}
if(sessionStorage.getItem('unlocked') === '1') document.getElementById('lockScreen').style.display = 'none';

// SPOTIFY TOGGLE
function toggleSpotify() {
    var box = document.getElementById('spotifyBox');
    var btn = document.getElementById('musicBtn');
    box.classList.toggle('active');
    btn.classList.toggle('playing');
}

// TIMER (Sostituisci la data con la vostra)
var start = new Date('2024-01-01T00:00:00'); 
function updateTimer(){
    var diff = new Date() - start;
    document.getElementById('t-giorni').textContent = Math.floor(diff/86400000);
    document.getElementById('t-ore').textContent = String(Math.floor((diff%86400000)/3600000)).padStart(2,'0');
    document.getElementById('t-min').textContent = String(Math.floor((diff%3600000)/60000)).padStart(2,'0');
    document.getElementById('t-sec').textContent = String(Math.floor((diff%60000)/1000)).padStart(2,'0');
}
setInterval(updateTimer, 1000);

// ANIMAZIONI PETALI
var pc = document.getElementById('petalContainer');
for(var i=0; i<15; i++){
    var p = document.createElement('div');
    p.classList.add('petal');
    p.style.left = Math.random()*100+'%';
    p.style.animationDelay = Math.random()*10+'s';
    pc.appendChild(p);
}

$(document).ready(function(){
    setTimeout(function(){ if(typeof startHeartAnimation === 'function') startHeartAnimation(); }, 2000);
});
</script>
</body>
</html>
